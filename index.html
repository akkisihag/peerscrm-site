<style id="peers-responsive">
/* Mobile responsiveness: the exported design is desktop-only (only shrinks
   headings). These overrides stack the two-column sections, collapse the
   fixed-pixel grids, and stop content being clipped/overflowing on phones. */
@media (max-width: 860px){
  /* stack the alternating two-column feature blocks */
  .showcase{ flex-direction: column !important; gap: 28px !important; align-items: stretch !important; }
  .showcase > *{ width: 100% !important; max-width: 100% !important; }
  /* stack the hero (text + dashboard card); NOT the header (.page.fx.ac.jb) or footer (.wrap) */
  .page.fx.gap24:not(.wrap){ flex-wrap: wrap !important; }
  .page.fx.gap24:not(.wrap) > *{ flex: 1 1 100% !important; min-width: 0 !important; }
  /* fixed-pixel grids -> single column */
  .grid{ grid-template-columns: 1fr !important; }
  /* remove fixed section heights that clip content (e.g. the cut-off button) */
  .sect{ height: auto !important; min-height: 0 !important; }
  /* full-width container with side padding */
  .page{ max-width: 100% !important; padding-left: 20px !important; padding-right: 20px !important; box-sizing: border-box !important; }
  /* cap oversized content images WITHOUT distorting fixed-size logos (no height:auto) */
  img{ max-width: 100% !important; }
  html, body{ overflow-x: hidden !important; }
}
@media (max-width: 520px){
  .grid.tc, .page.grid{ grid-template-columns: 1fr !important; }
  .fx.ac.jc.gap8.wrap{ gap: 6px !important; }
}
</style>

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

aybtn\" onclick=\"{{ playToolsDemo }}\" aria-label=\"Play demo video\"><span class=\"playtri\"><\u002Fspan><\u002Fbutton>\n<span class=\"fs15 fw6\" style=\"color:#9db8dd\">▶ Play the 3½-minute demo<\u002Fspan>\n<\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fsection>\n<\u002Fdiv>\n<\u002Fsc-if>\n<sc-if value=\"{{ isSupport }}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"Support\">\n<section class=\"hero\" style=\"padding:72px 0 56px\">\n<div class=\"page tc\"><div class=\"eyebrow\">Support<\u002Fdiv><h1 class=\"h1 hd mt12\" style=\"font-size:48px\">We're here to help.<\u002Fh1><p class=\"lead mt12\" style=\"max-width:520px;margin:16px auto 0\">Real humans, fast answers — every plan includes support from our team.<\u002Fp><\u002Fdiv>\n<\u002Fsection>\n<section class=\"page\" style=\"padding:64px 32px 40px\">\n<div class=\"grid\" style=\"grid-template-columns:repeat(3,1fr);gap:20px\">\n<div class=\"card tc\"><div class=\"ic icb\" style=\"margin:0 auto\">@<\u002Fdiv><h3 class=\"h3 mt16\">Email support<\u002Fh3><p class=\"body mt8\">info@peerscrm.com<br>Replies within one business day.<\u002Fp><\u002Fdiv>\n<div class=\"card tc\"><div class=\"ic icg\" style=\"margin:0 auto\">✆<\u002Fdiv><h3 class=\"h3 mt16\">Phone<\u002Fh3><p class=\"body mt8\">+1 (303) 210-8934<br>Mon–Fri, 9am–6pm MT.<\u002Fp><\u002Fdiv>\n<div class=\"card tc\"><div class=\"ic icp\" style=\"margin:0 auto\">▦<\u002Fdiv><h3 class=\"h3 mt16\">Onboarding<\u002Fh3><p class=\"body mt8\">Free setup help on every plan; guided onboarding on Scale.<\u002Fp><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n<section class=\"page\" style=\"padding:24px 32px 96px;max-width:780px\">\n<h2 class=\"h2 hd tc\" style=\"font-size:32px\">Frequently asked<\u002Fh2>\n<div style=\"margin-top:24px\">\n<div class=\"faq\"><div class=\"fw7 fs16\">How long does setup take?<\u002Fdiv><p class=\"body mt8\">Most teams are up and running in an afternoon. Import your contacts, invite your team, and you're working.<\u002Fp><\u002Fdiv>\n<div class=\"faq\"><div class=\"fw7 fs16\">Can you migrate my data from another CRM?<\u002Fdiv><p class=\"body mt8\">Yes — we import from spreadsheets and all major CRMs. Migration help is free on every plan.<\u002Fp><\u002Fdiv>\n<div class=\"faq\"><div class=\"fw7 fs16\">What counts as a report?<\u002Fdiv><p class=\"body mt8\">Any client-facing document generated from your CRM data — pipeline summaries, activity recaps, or account reviews. Each uses one credit.<\u002Fp><\u002Fdiv>\n<div class=\"faq\"><div class=\"fw7 fs16\">Do you offer training for my team?<\u002Fdiv><p class=\"body mt8\">Every plan includes our help center and video guides; Scale includes live onboarding sessions.<\u002Fp><\u002Fdiv>\n<div class=\"faq\"><div class=\"fw7 fs16\">Is my data safe?<\u002Fdiv><p class=\"body mt8\">Your data is encrypted in transit and at rest, backed up daily, and never sold or shared.<\u002Fp><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"tc\" style=\"margin-top:40px\"><a class=\"btn btnp\" style=\"padding:14px 28px\" onclick=\"{{ goContact }}\">Still stuck? Contact us<\u002Fa><\u002Fdiv>\n<\u002Fsection>\n<\u002Fdiv>\n<\u002Fsc-if>\n<sc-if value=\"{{ isContact }}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"Contact Us\">\n<section class=\"hero\" style=\"padding:72px 0 56px\">\n<div class=\"page tc\"><div class=\"eyebrow\">Contact us<\u002Fdiv><h1 class=\"h1 hd mt12\" style=\"font-size:48px\">Talk to a human.<\u002Fh1><p class=\"lead mt12\" style=\"max-width:520px;margin:16px auto 0\">Questions about plans, migrations, or whether PeersCRM fits your team? We reply within one business day.<\u002Fp><\u002Fdiv>\n<\u002Fsection>\n<section class=\"sect\" style=\"padding-top:56px\">\n<div class=\"page fx gap24\">\n<div style=\"flex:1\">\n<h2 class=\"h2 hd\" style=\"font-size:28px\">Reach us directly<\u002Fh2>\n<div class=\"col gap12\" style=\"margin-top:24px\">\n<div class=\"fx ac gap12\"><div class=\"ic icb\">@<\u002Fdiv><div><div class=\"fw7 fs14\">Email<\u002Fdiv><div class=\"muted fs14\">info@peerscrm.com<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"fx ac gap12\"><div class=\"ic icg\">✆<\u002Fdiv><div><div class=\"fw7 fs14\">Phone<\u002Fdiv><div class=\"muted fs14\">+1 (303) 210-8934<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"fx ac gap12\"><div class=\"ic icp\">▦<\u002Fdiv><div><div class=\"fw7 fs14\">Book a call<\u002Fdiv><div class=\"muted fs14\">20-minute demo, no pressure<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<div style=\"flex:1.1\">\n<div class=\"card\" style=\"padding:34px\">\n<sc-if value=\"{{ sent }}\" hint-placeholder-val=\"{{ false }}\">\n<div class=\"tc\" style=\"padding:40px 0\"><div class=\"ic icg\" style=\"margin:0 auto;width:56px;height:56px;font-size:26px\">✓<\u002Fdiv><h3 class=\"h3 mt16\">Message sent!<\u002Fh3><p class=\"body mt8\">Thanks — we'll get back to you within one business day.<\u002Fp><\u002Fdiv>\n<\u002Fsc-if>\n<sc-if value=\"{{ notSent }}\" hint-placeholder-val=\"{{ true }}\">\n<div class=\"grid\" style=\"grid-template-columns:1fr 1fr;gap:16px\">\n<div><label class=\"ilab\">Name<\u002Flabel><input class=\"input\" placeholder=\"Your name\"><\u002Fdiv>\n<div><label class=\"ilab\">Company<\u002Flabel><input class=\"input\" placeholder=\"Company name\"><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"mt16\"><label class=\"ilab\">Work email<\u002Flabel><input class=\"input\" placeholder=\"you@company.com\"><\u002Fdiv>\n<div class=\"mt16\"><label class=\"ilab\">How can we help?<\u002Flabel><textarea class=\"input\" rows=\"4\" placeholder=\"Tell us a little about your team and what you're looking for\" style=\"resize:vertical\"><\u002Ftextarea><\u002Fdiv>\n<button class=\"btn btnp mt16 w100 bbox\" onclick=\"{{ sendMessage }}\">Send message<\u002Fbutton>\n<\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n<\u002Fdiv>\n<\u002Fsc-if>\n<footer class=\"footer\">\n<div class=\"page\">\n<div class=\"fx jb wrap\" style=\"gap:48px\">\n<div style=\"max-width:280px\"><img src=\"ec06756a-d92f-4771-b3a2-b226c0343156\" style=\"height:32px\" alt=\"PeersCRM\"><p class=\"mt12\" style=\"font-size:14px;line-height:1.6;color:#9db8dd\">The warm, trustworthy CRM for contractors and growing businesses.<\u002Fp>\n<div class=\"fx ac gap10 mt16\">\n<a class=\"soc\" href=\"https://x.com/PeersCRM\" target=\"_blank\" aria-label=\"PeersCRM on X\"><svg viewBox=\"0 0 24 24\"><path d=\"M18.9 1.2h3.68l-8.04 9.19L24 22.85h-7.41l-5.8-7.58-6.64 7.58H.47l8.6-9.83L0 1.2h7.59l5.24 6.93L18.9 1.2zm-1.29 19.5h2.04L6.48 3.29H4.3l13.31 17.41z\"><\u002Fpath><\u002Fsvg><\u002Fa>\n<a class=\"soc\" href=\"https://www.instagram.com/peerscrmhq\" target=\"_blank\" aria-label=\"PeersCRM on Instagram\"><svg viewBox=\"0 0 24 24\"><path d=\"M12 2.16c3.2 0 3.58.01 4.85.07 1.17.05 1.8.25 2.23.41.56.22.96.48 1.38.9.42.42.68.82.9 1.38.16.42.36 1.06.41 2.23.06 1.27.07 1.65.07 4.85s-.01 3.58-.07 4.85c-.05 1.17-.25 1.8-.41 2.23a3.7 3.7 0 0 1-.9 1.38c-.42.42-.82.68-1.38.9-.42.16-1.06.36-2.23.41-1.27.06-1.65.07-4.85.07s-3.58-.01-4.85-.07c-1.17-.05-1.8-.25-2.23-.41a3.7 3.7 0 0 1-1.38-.9 3.7 3.7 0 0 1-.9-1.38c-.16-.42-.36-1.06-.41-2.23C2.17 15.58 2.16 15.2 2.16 12s.01-3.58.07-4.85c.05-1.17.25-1.8.41-2.23.22-.56.48-.96.9-1.38.42-.42.82-.68 1.38-.9.42-.16 1.06-.36 2.23-.41C8.42 2.17 8.8 2.16 12 2.16M12 0C8.74 0 8.33.01 7.05.07 5.78.13 4.9.33 4.14.63a5.9 5.9 0 0 0-2.13 1.38A5.9 5.9 0 0 0 .63 4.14C.33 4.9.13 5.78.07 7.05.01 8.33 0 8.74 0 12s.01 3.67.07 4.95c.06 1.27.26 2.15.56 2.91.31.79.72 1.46 1.38 2.13a5.9 5.9 0 0 0 2.13 1.38c.76.3 1.64.5 2.91.56C8.33 23.99 8.74 24 12 24s3.67-.01 4.95-.07c1.27-.06 2.15-.26 2.91-.56a5.9 5.9 0 0 0 2.13-1.38 5.9 5.9 0 0 0 1.38-2.13c.3-.76.5-1.64.56-2.91.06-1.28.07-1.69.07-4.95s-.01-3.67-.07-4.95c-.06-1.27-.26-2.15-.56-2.91a5.9 5.9 0 0 0-1.38-2.13A5.9 5.9 0 0 0 19.86.63c-.76-.3-1.64-.5-2.91-.56C15.67.01 15.26 0 12 0zm0 5.84A6.16 6.16 0 1 0 18.16 12 6.16 6.16 0 0 0 12 5.84zm0 10.16A4 4 0 1 1 16 12a4 4 0 0 1-4 4zm7.85-10.4a1.44 1.44 0 1 1-1.44-1.44 1.44 1.44 0 0 1 1.44 1.44z\"><\u002Fpath><\u002Fsvg><\u002Fa>\n<\u002Fdiv><\u002Fdiv>\n<div class=\"fx wrap\" style=\"gap:72px\">\n<div class=\"col gap10\"><span class=\"fhead\">Product<\u002Fspan><a onclick=\"{{ goHome }}\">Home<\u002Fa><a onclick=\"{{ goTools }}\">Tools<\u002Fa><a onclick=\"{{ goPricing }}\">Pricing<\u002Fa><\u002Fdiv>\n<div class=\"col gap10\"><span class=\"fhead\">Add-ons<\u002Fspan><a onclick=\"{{ goTools }}\">Marketing<\u002Fa><a onclick=\"{{ goTools }}\">Call Center<\u002Fa><\u002Fdiv>\n<div class=\"col gap10\"><span class=\"fhead\">Company<\u002Fspan><a onclick=\"{{ goAbout }}\">About Us<\u002Fa><a onclick=\"{{ goSupport }}\">Support<\u002Fa><a onclick=\"{{ goContact }}\">Contact Us<\u002Fa><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<div style=\"border-top:1px solid #0b3d7d;margin-top:44px;padding-top:22px\" class=\"fx jb ac\"><span class=\"fs13\" style=\"color:#6f8fb8\">© 2026 PeersCRM. All rights reserved.<\u002Fspan><span class=\"fs13\" style=\"color:#6f8fb8\">Privacy · Terms<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<\u002Ffooter>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;videoUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Demo video&quot;},&quot;loginUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;https://www.peerscrm.com/login&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Links&quot;},&quot;signupUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;https://www.peerscrm.com/signup&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Links&quot;}}\">\nclass Component extends DCLogic {\n  state = { page: 'home', sent: false, videoPlaying: false, toolsVid: false, tab: 0, menu: false };\n  go(page) {\n    this.setState({ page, menu: false });\n    const el = document.scrollingElement || document.documentElement;\n    el.scrollTop = 0;\n  }\n  renderVals() {\n    const { page, tab } = this.state;\n    const playing = this.state.videoPlaying;\n    const loginUrl = this.props.loginUrl ?? 'https://www.peerscrm.com/login';\n    const signupUrl = this.props.signupUrl ?? 'https://www.peerscrm.com/signup';\n    return {\n      loginUrl, signupUrl,\n      isHome: page === 'home', isPricing: page === 'pricing', isAbout: page === 'about',\n      isTools: page === 'tools', isSupport: page === 'support', isContact: page === 'contact',\n      navHome: page === 'home' ? 'navon' : '', navPricing: page === 'pricing' ? 'navon' : '', navAbout: page === 'about' ? 'navon' : '',\n      navTools: page === 'tools' ? 'navon' : '', navSupport: page === 'support' ? 'navon' : '', navContact: page === 'contact' ? 'navon' : '',\n      goHome: () => this.go('home'), goPricing: () => this.go('pricing'), goAbout: () => this.go('about'),\n      goTools: () => this.go('tools'), goSupport: () => this.go('support'), goContact: () => this.go('contact'),\n      goHomeM: () => this.go('home'), goPricingM: () => this.go('pricing'), goAboutM: () => this.go('about'),\n      goToolsM: () => this.go('tools'), goSupportM: () => this.go('support'), goContactM: () => this.go('contact'),\n      menuOpen: this.state.menu ? 'open' : '',\n      toggleMenu: () => this.setState(s => ({ menu: !s.menu })),\n      tab0: tab === 0 ? 'tabon' : '', tab1: tab === 1 ? 'tabon' : '', tab2: tab === 2 ? 'tabon' : '', tab3: tab === 3 ? 'tabon' : '',\n      isTab0: tab === 0, isTab1: tab === 1, isTab2: tab === 2, isTab3: tab === 3,\n      setTab0: () => this.setState({ tab: 0 }), setTab1: () => this.setState({ tab: 1 }),\n      setTab2: () => this.setState({ tab: 2 }), setTab3: () => this.setState({ tab: 3 }),\n      sent: this.state.sent, notSent: !this.state.sent,\n      sendMessage: () => this.setState({ sent: true }),\n      videoEl: this.props.videoUrl ? React.createElement('video', { src: this.props.videoUrl, controls: true, autoPlay: true, style: { width: '100%', height: '100%', display: 'block', objectFit: 'cover' } }) : null,\n      videoPlaying: playing && !!this.props.videoUrl,\n      demoPlaying: playing && !this.props.videoUrl,\n      videoIdle: !playing,\n      playVideo: () => this.setState({ videoPlaying: true }),\n      toolsDemoPlaying: this.state.toolsVid,\n      toolsDemoIdle: !this.state.toolsVid,\n      playToolsDemo: () => this.setState({ toolsVid: true }),\n      playFromNav: () => { this.setState({ page: 'home', videoPlaying: true }); }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
<script>
(function(){
  var APP_URL='https://app.peerscrm.com/';
  /* The CRM now has public self-signup with a 30-day trial, so "Try for free"
     goes straight to the app's signup screen (was a mailto invite request). */
  var TRIAL='https://app.peerscrm.com/signup';
  var SALES=('mailto:info@peerscrm.com?subject='+encodeURIComponent('PeersCRM — Talk to Sales')+'&body='+encodeURIComponent("Hi PeersCRM team,\n\nI'd like to talk to sales about PeersCRM.\n\nName:\nCompany:\nPhone:\n\nThanks!"));
  var DEMO='__peers_demo__';
  var LOGIN=['sign in','log in','login'];
  var SIGNUP=['try for free','start free trial','start for free','sign up','get started'];
  var TALK=['talk to sales','contact sales'];
  var WATCH=['watch demo','watch now','watch now →','watch the full tour'];
  // Responsive CSS injected at runtime — the React app strips styles added to
  // static <head>, so we (re)insert this via JS and keep it alive on mutations.
  var RESPCSS='@media (max-width:860px){.showcase{flex-direction:column!important;gap:28px!important;align-items:stretch!important}.showcase>*{width:100%!important;max-width:100%!important}.page.fx.gap24:not(.wrap){flex-wrap:wrap!important}.page.fx.gap24:not(.wrap)>*{flex:1 1 100%!important;min-width:0!important}.grid{grid-template-columns:1fr!important}.sect{height:auto!important;min-height:0!important}.page{max-width:100%!important;padding-left:20px!important;padding-right:20px!important;box-sizing:border-box!important}img{max-width:100%!important}html,body{overflow-x:hidden!important}}@media (max-width:520px){.grid.tc,.page.grid{grid-template-columns:1fr!important}.fx.ac.jc.gap8.wrap{gap:6px!important}}';
  function ensureStyle(){
    if(!document.getElementById('peers-responsive-js')){
      var st=document.createElement('style'); st.id='peers-responsive-js'; st.textContent=RESPCSS;
      (document.head||document.documentElement).appendChild(st);
    }
  }
  function txt(el){return (el.textContent||'').trim().replace(/\s+/g,' ').toLowerCase();}
  function pick(t){
    if(LOGIN.indexOf(t)>=0)return APP_URL;
    if(SIGNUP.indexOf(t)>=0)return TRIAL;
    if(TALK.indexOf(t)>=0)return SALES;
    if(WATCH.indexOf(t)>=0 || /play the.*demo/.test(t))return DEMO;
    return null;
  }
  function wire(){
    ensureStyle();
    document.querySelectorAll('a,button').forEach(function(el){
      var d=pick(txt(el)); if(!d)return;
      if(el.tagName==='A' && d!==DEMO){
        el.setAttribute('href',d);
        if(/^https?:/.test(d)){ el.setAttribute('target','_blank'); el.setAttribute('rel','noopener'); }
      }
      el.setAttribute('data-peers',d);
    });
    document.querySelectorAll('.vidframe').forEach(function(el){ el.setAttribute('data-peers',DEMO); el.style.cursor='pointer'; });
    document.querySelectorAll('.vstripe').forEach(function(el){
      el.style.backgroundImage="linear-gradient(rgba(6,16,42,.30),rgba(6,16,42,.42)), url('/demo-thumb.svg')";
      el.style.backgroundSize='cover'; el.style.backgroundPosition='center'; el.style.backgroundRepeat='no-repeat';
    });
  }
  function openDemo(){
    if(document.getElementById('peersDemoModal'))return;
    var o=document.createElement('div'); o.id='peersDemoModal';
    o.style.cssText='position:fixed;inset:0;z-index:99999;background:rgba(6,12,34,.88);display:flex;align-items:center;justify-content:center;padding:24px;';
    var box=document.createElement('div'); box.style.cssText='position:relative;width:min(1100px,96vw);aspect-ratio:16/9;background:#000;border-radius:14px;overflow:hidden;box-shadow:0 24px 90px rgba(0,0,0,.55);';
    var f=document.createElement('iframe'); f.src='/demo.html?autoplay=1'; f.style.cssText='width:100%;height:100%;border:0;display:block;'; f.setAttribute('allow','autoplay; fullscreen; encrypted-media');
    var c=document.createElement('button'); c.setAttribute('aria-label','Close'); c.textContent='✕';
    c.style.cssText='position:fixed;top:18px;right:22px;width:42px;height:42px;border-radius:50%;border:0;background:#fff;color:#0b1220;font-size:18px;line-height:1;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.35);';
    function close(){ o.remove(); document.removeEventListener('keydown',esc); }
    function esc(e){ if(e.key==='Escape')close(); }
    c.addEventListener('click',close);
    o.addEventListener('click',function(e){ if(e.target===o)close(); });
    document.addEventListener('keydown',esc);
    box.appendChild(f); o.appendChild(box); o.appendChild(c); document.body.appendChild(o);
  }
  document.addEventListener('click',function(e){
    var el=e.target.closest&&e.target.closest('[data-peers]'); if(!el)return;
    var d=el.getAttribute('data-peers'); if(!d)return;
    e.preventDefault(); e.stopPropagation();
    if(d===DEMO)openDemo();
    else if(/^https?:/.test(d))window.open(d,'_blank','noopener');
    else window.location.href=d;
  },true);
  try{ new MutationObserver(wire).observe(document.documentElement,{childList:true,subtree:true}); }catch(_){}
  if(document.readyState!=='loading') wire(); else document.addEventListener('DOMContentLoaded',wire);
})();
</script>
